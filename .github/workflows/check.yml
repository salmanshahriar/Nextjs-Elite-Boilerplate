name: Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    env:
      SKIP_ENV_VALIDATION: 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.github/nodejs.version'
          cache: 'npm'

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint & format
        run: npm run lint

      - name: Knip (unused code/deps)
        run: npm run knip

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
